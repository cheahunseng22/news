<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifestyle - ChnCam Cambodia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#FDF8F0;color:#1A1814}
  :root{--gold:#C9A84C;--charcoal:#1A1814;--cream:#FDF8F0;--muted:#7A7268}
  header{background:white;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100}
  .header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--charcoal)}
  .logo span{color:var(--gold)}
  .logo small{display:block;font-size:10px;letter-spacing:3px;color:var(--muted)}
  nav a{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;text-transform:uppercase;padding:8px 14px;border-radius:4px;color:#3D3830;text-decoration:none}
  nav a:hover,nav a.active{background:var(--charcoal);color:var(--gold)}
  .hero{max-width:1200px;margin:40px auto;padding:0 24px}
  .hero h1{font-size:48px;font-weight:900;color:var(--charcoal);margin-bottom:10px}
  .article-grid{max-width:1200px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
  .article-card{cursor:pointer;transition:transform .2s;background:white;border-radius:8px;overflow:hidden;border:1px solid #E8E0D0}
  .article-card:hover{transform:translateY(-3px)}
  .article-thumb{width:100%;height:200px;object-fit:cover}
  .article-info{padding:16px}
  .cat{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
  h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:8px}
  p{font-size:14px;color:var(--muted);line-height:1.6}
  .meta{font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid #E8E0D0}
  .loading{text-align:center;padding:60px;font-size:18px;color:var(--muted)}
  footer{background:var(--charcoal);color:rgba(255,255,255,0.6);padding:40px;text-align:center}
  .back-to-top{position:fixed;bottom:30px;right:30px;background:var(--gold);width:45px;height:45px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.3s;z-index:99}
  .back-to-top.show{opacity:1}
  @media(max-width:900px){.article-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="header-inner"><a href="index.html" style="text-decoration:none"><div class="logo">Chn<span>Cam</span><small>Cambodia News</small></div></a><nav><a href="index.html">Home</a><a href="news.html">News</a><a href="culture.html">Culture</a><a href="business.html">Business</a><a href="lifestyle.html" class="active">Lifestyle</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav></div></header>
<div class="hero"><h1>Lifestyle</h1><p>Food, travel, health, and living well in Cambodia</p></div>
<div class="article-grid" id="lifestyleGrid"><div class="loading">Loading lifestyle news...</div></div>
<footer><p>© 2026 ChnCam · All rights reserved.</p></footer>
<div class="back-to-top" id="backToTop">↑</div>
<script>
  async function loadLifestyle(){
    try{
      let res=await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.khmertimeskh.com/feed/');
      let data=await res.json();
      let articles=(data.items||[]).filter(art=>art.title.toLowerCase().includes('food')||art.title.toLowerCase().includes('travel')||art.title.toLowerCase().includes('health')||art.title.toLowerCase().includes('lifestyle')).slice(0,9);
      if(articles.length===0) articles=(data.items||[]).slice(0,9);
      if(articles.length===0){
        document.getElementById('lifestyleGrid').innerHTML='<div class="loading">Unable to load lifestyle news</div>';
        return;
      }
      document.getElementById('lifestyleGrid').innerHTML=articles.map(art=>`
        <div class="article-card" onclick="window.open('${art.link}','_blank')">
          <img class="article-thumb" src="${art.thumbnail||'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22%3E%3Crect width=%22300%22 height=%22200%22 fill=%22%23C9A84C%22/%3E%3Ctext x=%22150%22 y=%22100%22 fill=%22white%22 text-anchor=%22middle%22%3ELifestyle%3C/text%3E%3C/svg%3E'}" alt="${art.title}">
          <div class="article-info">
            <div class="cat">Lifestyle</div>
            <h3>${art.title.substring(0,80)}</h3>
            <p>${(art.description||'').replace(/<[^>]*>/g,'').substring(0,120)}...</p>
            <div class="meta">${new Date(art.pubDate).toDateString()}</div>
          </div>
        </div>
      `).join('');
    }catch(e){document.getElementById('lifestyleGrid').innerHTML='<div class="loading">Error loading lifestyle news</div>';}
  }
  window.addEventListener('load',loadLifestyle);
  let btn=document.getElementById('backToTop');
  window.addEventListener('scroll',()=>{btn.classList.toggle('show',window.scrollY>300)});
  btn.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
</script>
</body>
</html>
