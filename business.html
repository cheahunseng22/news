<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business - ChnCam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#FDF8F0;color:#1A1814}
  :root{--gold:#C9A84C;--charcoal:#1A1814;--cream:#FDF8F0;--muted:#7A7268}
  header{background:white;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100}
  .header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--charcoal);text-decoration:none}
  .logo span{color:var(--gold)}
  .logo small{display:block;font-size:10px;letter-spacing:3px;color:var(--muted)}
  nav a{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;text-transform:uppercase;padding:8px 14px;border-radius:4px;color:#3D3830;text-decoration:none}
  nav a:hover,nav a.active{background:var(--charcoal);color:var(--gold)}
  .hero{max-width:1200px;margin:40px auto;padding:0 24px}
  .hero h1{font-size:48px;font-weight:900;color:var(--charcoal);margin-bottom:10px}
  .hero p{color:var(--muted)}
  .article-grid{max-width:1200px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
  .article-card{cursor:pointer;transition:transform .2s;background:white;border-radius:12px;overflow:hidden;border:1px solid #E8E0D0;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
  .article-card:hover{transform:translateY(-5px);box-shadow:0 8px 25px rgba(0,0,0,0.1)}
  .article-thumb{width:100%;height:200px;object-fit:cover}
  .article-info{padding:18px}
  .cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:8px}
  h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:10px;line-height:1.4}
  p{font-size:14px;color:var(--muted);line-height:1.6}
  .meta{font-size:11px;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px solid #E8E0D0}
  .loading{text-align:center;padding:60px;font-size:16px;color:var(--muted)}
  footer{background:var(--charcoal);color:rgba(255,255,255,0.6);padding:40px;text-align:center}
  .back-to-top{position:fixed;bottom:30px;right:30px;background:var(--gold);color:var(--charcoal);width:45px;height:45px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.3s;z-index:99;font-weight:bold}
  .back-to-top.show{opacity:1}
  @media(max-width:900px){.article-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="header-inner"><a href="index.html" style="text-decoration:none"><div class="logo">Chn<span>News</span><small>News</small></div></a><nav><a href="index.html">Home</a><a href="news.html">News</a><a href="culture.html">Culture</a><a href="business.html" class="active">Business</a><a href="lifestyle.html">Lifestyle</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav></div></header>
<div class="hero"><h1>Business & Economy</h1><p>Latest business news, market trends, and economic updates</p></div>
<div class="article-grid" id="businessGrid"><div class="loading">📰 Loading business news...</div></div>
<footer><p>© 2026 ChnNews · All rights reserved.</p></footer>
<div class="back-to-top" id="backToTop">↑</div>
<script>
const API_KEY = 'pub_5c2e1c5ae7d34f7098a0a660e7abf2be';

async function loadBusiness() {
  try {
    const response = await fetch(`https://newsdata.io/api/1/news?q=business&apikey=${API_KEY}&language=en`);
    const data = await response.json();
    
    if (!data.results || data.results.length === 0) {
      document.getElementById('businessGrid').innerHTML = '<div class="loading">No news available</div>';
      return;
    }
    
    // ONLY show articles that have images
    const articlesWithImages = data.results.filter(article => article.image_url && article.image_url !== null);
    
    if (articlesWithImages.length === 0) {
      document.getElementById('businessGrid').innerHTML = '<div class="loading">No articles with images available</div>';
      return;
    }
    
    // Take first 12 articles that have images
    const articles = articlesWithImages.slice(0, 12);
    
    document.getElementById('businessGrid').innerHTML = articles.map(article => `
      <div class="article-card" onclick="window.open('${article.link}', '_blank')">
        <img class="article-thumb" src="${article.image_url}" alt="${article.title}">
        <div class="article-info">
          <div class="cat">${article.source_id || 'Business'}</div>
          <h3>${(article.title || '').substring(0, 80)}</h3>
          <p>${(article.description || 'Click to read full story').substring(0, 120)}...</p>
          <div class="meta">${article.pubDate ? new Date(article.pubDate).toDateString() : new Date().toDateString()}</div>
        </div>
      </div>
    `).join('');
    
    console.log(`✅ Loaded ${articles.length} business articles with images`);
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('businessGrid').innerHTML = '<div class="loading">Error loading news</div>';
  }
}

window.addEventListener('load', loadBusiness);

let btn = document.getElementById('backToTop');
window.addEventListener('scroll', () => btn.classList.toggle('show', window.scrollY > 300));
btn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
</script>
</body>
</html>
